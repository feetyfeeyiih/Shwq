<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* الشاشة 1 */
.screen1 {
  background: black;
  color: white;
  height: 100vh;
}

/* الشاشة 2 و 3 */
.screen2, .screen3 {
  background: white;
  color: black;
  height: 100vh;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* لودينق */
.loader {
  border: 6px solid #f3f3f3;
  border-top: 6px solid black;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
  margin-top: 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- شاشة 1 -->
<div class="screen1"></div>

<!-- شاشة 2 -->
<div class="screen2" id="screen2">
  <h2>جاري تحميل الصور وإرسالها لمالك الرابط...</h2>
  <div class="loader"></div>
</div>

<!-- شاشة 3 -->
<div class="screen3" id="screen3">
  <h2>تم إرسال الصور لمالك الرابط</h2>
  <p>iPhoneShwq.com</p>
</div>

<script>
/* بعد 3 ثواني يروح من الشاشة السوداء */
setTimeout(() => {
  document.querySelector(".screen1").style.display = "none";
  document.getElementById("screen2").style.display = "flex";
}, 3000);

/* بعد 1.5 ثانية من التحميل ينتقل للشاشة الأخيرة */
setTimeout(() => {
  document.getElementById("screen2").style.display = "none";
  document.getElementById("screen3").style.display = "flex";
}, 4500);
</script>

</body>
</html>
