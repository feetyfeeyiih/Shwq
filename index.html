<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
}

/* شاشة سوداء */
.screen1 {
  background: black;
  height: 100vh;
}

/* شاشة التحميل */
.screen2 {
  background: white;
  height: 100vh;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.screen3 {
  background: white;
  height: 100vh;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.loader {
  border: 6px solid #eee;
  border-top: 6px solid black;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  animation: spin 0.5s linear infinite;
  margin-top: 20px;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.percent {
  font-size: 30px;
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="screen1"></div>

<div class="screen2" id="screen2">
  <h2>جاري الوصول إلى الصور...</h2>
  <div class="loader"></div>
  <div class="percent" id="percent">0%</div>
  <p>يرجى عدم إغلاق الصفحة</p>
</div>

<div class="screen3" id="screen3">
  <h2>تم إرسال الصور بنجاح 📸</h2>
  <p>iPhoneSultan.com</p>
</div>

<script>

/* الشاشة السوداء (2 ثانية) */
setTimeout(() => {
  document.querySelector(".screen1").style.display = "none";
  document.getElementById("screen2").style.display = "flex";
}, 2000);

/* عداد سريع جدًا (نص ثانية) */
let percent = 0;
let interval = setInterval(() => {
  percent += 20; // يقفز بسرعة

  if (percent > 100) percent = 100;

  document.getElementById("percent").innerText = percent + "%";

  if (percent >= 100) {
    clearInterval(interval);

    setTimeout(() => {
      document.getElementById("screen2").style.display = "none";
      document.getElementById("screen3").style.display = "flex";
    }, 200);
  }

}, 100); // السرعة هنا (0.1 ثانية)

</script>

</body>
</html>
